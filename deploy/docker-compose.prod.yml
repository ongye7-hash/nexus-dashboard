# VPS 배포용 (146.190.50.42)
# 사용법:
#   1. VPS에 이 파일과 nginx.conf 복사
#   2. docker compose -f docker-compose.prod.yml up -d --build
#   3. nginx 설정 적용 후 certbot으로 HTTPS 추가

services:
  nexus:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:8507:8507"
      - "127.0.0.1:8508:8508"
    volumes:
      - nexus-data:/app/.nexus-data
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - PORT=8507
      # 도메인 연결 후 아래 주석 해제
      # - NEXUS_ORIGIN=https://your-domain.com

volumes:
  nexus-data:
