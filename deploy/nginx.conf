# /etc/nginx/sites-available/nexus
# Cloudflare 프록시 ON → HTTPS 자동 (certbot 불필요)
# Cloudflare에서 SSL: Full 모드 설정 권장

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name ongye.org;  # Cloudflare 프록시 → HTTPS 자동

    # 요청 크기 제한 (파일 업로드 등)
    client_max_body_size 50M;

    # Next.js 앱
    location / {
        proxy_pass http://127.0.0.1:8507;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # WebSocket 터미널 (wss://domain/ws/terminal → localhost:8508)
    location /ws/terminal {
        proxy_pass http://127.0.0.1:8508;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;  # 24시간 (터미널 세션 유지)
        proxy_send_timeout 86400;
    }
}
