# /etc/nginx/sites-available/nexus
# 도메인 연결 후 server_name을 실제 도메인으로 변경
# certbot --nginx -d your-domain.com 으로 HTTPS 자동 추가

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name _;  # 도메인 연결 전 IP로 접근 가능

    # 요청 크기 제한 (파일 업로드 등)
    client_max_body_size 50M;

    # Next.js 앱
    location / {
        proxy_pass http://127.0.0.1:8507;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # WebSocket 터미널 (wss://domain/ws/terminal → localhost:8508)
    location /ws/terminal {
        proxy_pass http://127.0.0.1:8508;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;  # 24시간 (터미널 세션 유지)
        proxy_send_timeout 86400;
    }
}
